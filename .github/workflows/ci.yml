name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  legacy-types-gate:
    name: Legacy types grep gate
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Plan v3 U9c：SCAN_MODE 默认 fail，命中 legacy 类型 / redact 漂移即失败。
      - name: Run legacy-types scan
        run: bash scripts/check-no-legacy-types.sh

  test:
    name: Tests (vitest)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # vitest 用源码 TS（不读 src-node/dist），无需 build:worker。
      - name: Unit tests (vitest)
        run: npm test

      # e2e (Playwright) 只在打 tag 发布时跑（production-build.yml），
      # 不阻塞每次 PR/push 的 CI 反馈速度（install browser 耗时长）。

  lint:
    name: Lint + Rust tests (Biome + Rust)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Biome (lint + format)
        run: npm run lint

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Install Linux dependencies (for clippy)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: rustfmt --check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      # tauri.conf.json 的 resources 引用 src-node/dist 下的产物（两个 .mjs + claude-runtime/），
      # 构建脚本编译时逐个校验路径存在。clippy 会跑构建脚本，但 lint job 不跑 build:worker
      # （不需要 208MB 的真 binary，也不产真 bundle），故建空占位即可过校验。
      - name: Stub tauri dist resources (for clippy build script)
        run: |
          mkdir -p src-node/dist/claude-runtime
          touch src-node/dist/claude-agent-worker.mjs
          touch src-node/dist/tsn-topology-server.mjs

      - name: clippy -D warnings
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      # clippy --all-targets 已编译测试目标，cargo test 在同 job 内增量复用、不重复全量编译。
      # dist 占位同 clippy 所需（build script 校验 resources 路径）。
      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml
