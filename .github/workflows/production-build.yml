name: Production Desktop Build

on:
  workflow_dispatch:
  push:
    # 从 main 出 release：版本 bump 经 PR 合入 main 后，在 main 上打 tag vX.Y.Z 触发打包。
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare release metadata
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.release.outputs.version }}
      bump: ${{ steps.release.outputs.bump }}
      previous-tag: ${{ steps.release.outputs.previousTag }}
      commit-count: ${{ steps.release.outputs.commitCount }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate version and release notes
        id: release
        run: npm run release:prepare

  build:
    name: Build ${{ matrix.name }}
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: prepare-release
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            runner: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
            artifact-name: tsn-agent-macos-arm64
            artifact-path: src-tauri/target/aarch64-apple-darwin/release/bundle
          - name: macOS Intel
            runner: macos-latest
            args: --target x86_64-apple-darwin
            rust-targets: x86_64-apple-darwin
            artifact-name: tsn-agent-macos-x64
            artifact-path: src-tauri/target/x86_64-apple-darwin/release/bundle
          - name: Windows x64
            runner: windows-latest
            args: ""
            rust-targets: ""
            artifact-name: tsn-agent-windows-x64
            artifact-path: src-tauri/target/release/bundle
          - name: Linux x64
            runner: ubuntu-22.04
            args: ""
            rust-targets: ""
            artifact-name: tsn-agent-linux-x64
            artifact-path: src-tauri/target/release/bundle

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Linux dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install dependencies
        run: npm ci

      - name: Generate version and changelog
        run: npm run release:prepare

      - name: Load release notes
        id: release-notes
        shell: bash
        run: |
          {
            echo 'body<<EOF'
            cat release-notes.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Verify bundled skills
        run: npm run verify:skills

      - name: Build worker bundle
        run: npm run build:worker

      - name: Run unit tests
        run: npm test

      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ needs.prepare-release.outputs.version }}
          releaseName: HIBridge Agent v${{ needs.prepare-release.outputs.version }}
          releaseBody: ${{ steps.release-notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
