name: Production Desktop Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            runner: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
            artifact-name: tsn-agent-macos-arm64
            artifact-path: src-tauri/target/aarch64-apple-darwin/release/bundle
          - name: macOS Intel
            runner: macos-latest
            args: --target x86_64-apple-darwin
            rust-targets: x86_64-apple-darwin
            artifact-name: tsn-agent-macos-x64
            artifact-path: src-tauri/target/x86_64-apple-darwin/release/bundle
          - name: Windows x64
            runner: windows-latest
            args: ""
            rust-targets: ""
            artifact-name: tsn-agent-windows-x64
            artifact-path: src-tauri/target/release/bundle
          - name: Linux x64
            runner: ubuntu-22.04
            args: ""
            rust-targets: ""
            artifact-name: tsn-agent-linux-x64
            artifact-path: src-tauri/target/release/bundle

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install dependencies
        run: npm ci

      - name: Verify bundled skills
        run: npm run verify:skills

      - name: Run unit tests
        run: npm test

      - name: Build worker bundle
        run: npm run build:worker

      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 14
